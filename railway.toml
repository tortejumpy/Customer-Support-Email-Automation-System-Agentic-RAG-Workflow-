# Railway deployment configuration
# "email-automation" overrides the long GitHub repo name that Railway rejected.
[build]
builder = "NIXPACKS"

[deploy]
startCommand = "gunicorn -k uvicorn.workers.UvicornWorker api.server:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
